name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check OpenSSL Version
        shell: bash
        run: |
          docker run --rm \
              alpine/openssl version
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.5.1"

      - name: Build
        run: gradle build --no-daemon

      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          find build/libs -maxdepth 1 -type f -name "*.jar" \
            ! -name "*-dev.jar" \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts

      - name: Generate snapshot tag
        id: snapshot
        shell: bash
        run: |
          echo "tag=snapshot-$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "name=Snapshot $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: Malware Scanner
        uses: dell/common-github-actions/malware-scanner@main
        with:
          options: -ri

      - name: Sign release artifacts
        shell: bash
        env:
          SIGN_PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          trap 'rm -f private_key.pem; echo "Cleaned up private key."' EXIT
          umask 077
          printf '%s\n' "$SIGN_PRIVATE_KEY" >private_key.pem

          files=(release-artifacts/*.jar)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No JAR files found to sign"
            exit 1
          fi
          docker run --rm \
              -v "$PWD:/work" \
              -w /work \
              alpine/openssl pkey -pubout -in /work/private_key.pem -out /work/public_key.pem
          for file in "${files[@]}"; do
            docker run --rm \
              -v "$PWD:/work" \
              -w /work \
              alpine/openssl \
              dgst \
              -sign /work/private_key.pem \
              -out "/work/${file}.sign" \
              "/work/${file}"
          done
          rm -f private_key.pem
          ls -la release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || steps.snapshot.outputs.tag }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || steps.snapshot.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: |
            release-artifacts/*.jar
            release-artifacts/*.jar.sign
            public_key.pem
          generate_release_notes: true
          prerelease: ${{ github.ref_type != 'tag' }}
