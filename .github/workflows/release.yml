name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Build
        run: gradle build --no-daemon

      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          find build/libs -maxdepth 1 -type f -name "*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-dev.jar" \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts
      - name: Generate snapshot tag
        id: snapshot
        shell: bash
        run: |
          echo "tag=snapshot-$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "name=Snapshot $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"
      - name: Malware Scanner
        uses: dell/common-github-actions/malware-scanner@main
        with:
          options: -ri
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || steps.snapshot.outputs.tag }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || steps.snapshot.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: release-artifacts/*.jar
          generate_release_notes: true
          prerelease: ${{ github.ref_type != 'tag' }}
